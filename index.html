<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub Issue Tracker</title>

<script src="index.js"></script>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet"/>

</head>

<body class="bg-gray-100">

<!-- LOGIN PAGE -->

<div id="loginPage" class="flex justify-center items-center min-h-screen">

<div class="card w-96 bg-base-100 shadow-xl p-6">

<div class="text-center">
<h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
<p class="text-gray-500">Sign in to manage your issues</p>
</div>

<div class="mt-4">

<label class="label">Username</label>
<input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full">

<label class="label mt-3">Password</label>
<input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full">

<button onclick="login()" class="btn btn-primary w-full mt-5">
Sign In
</button>

<div class="text-center mt-4 text-sm">
<p>Demo Credentials</p>
<p><b>Username:</b> admin</p>
<p><b>Password:</b> admin123</p>
</div>

</div>
</div>
</div>

<!-- MAIN PAGE -->

<div id="mainPage" class="hidden">

<!-- NAVBAR -->

<div class="navbar bg-base-100 shadow-md">

<div class="flex-1">
<a class="text-xl font-bold">Issue Tracker</a>
</div>

<div class="flex gap-2">
<input id="searchInput" type="text" placeholder="Search..." class="input input-bordered">
<button onclick="searchIssues()" class="btn btn-primary">Search</button>
</div>

</div>

<!-- TABS -->

<div class="p-6">

<div class="tabs tabs-boxed mb-6">

<a class="tab tab-active" onclick="filterIssues('all')" id="tab-all">All</a>

<a class="tab" onclick="filterIssues('open')" id="tab-open">Open</a>

<a class="tab" onclick="filterIssues('closed')" id="tab-closed">Closed</a>

</div>

<!-- LOADING -->

<div id="loading" class="text-center hidden">
<span class="loading loading-spinner loading-lg"></span>
</div>

<!-- ISSUE GRID -->

<div id="issueContainer"
class="grid lg:grid-cols-4 md:grid-cols-2 grid-cols-1 gap-5">

</div>

</div>
</div>


<!-- MODAL -->

<dialog id="issueModal" class="modal">

<div class="modal-box">

<h3 id="modalTitle" class="font-bold text-lg"></h3>

<p id="modalDescription" class="py-2"></p>

<p><b>Status:</b> <span id="modalStatus"></span></p>
<p><b>Author:</b> <span id="modalAuthor"></span></p>
<p><b>Priority:</b> <span id="modalPriority"></span></p>
<p><b>Label:</b> <span id="modalLabel"></span></p>
<p><b>Created:</b> <span id="modalDate"></span></p>

<div class="modal-action">
<form method="dialog">
<button class="btn">Close</button>
</form>
</div>

</div>

</dialog>

</body>
</html>
